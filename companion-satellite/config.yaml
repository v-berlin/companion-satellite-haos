name: "Companion Satellite"
version: "1.0.0"
slug: "companion_satellite"
description: "Satellite Streamdeck connector for Bitfocus Companion (connects over TCP 16622)"
url: "https://github.com/v-berlin/companion-satellite-haos"
arch:
  - amd64
  - aarch64
image: "ghcr.io/v-berlin/companion-satellite-haos/{arch}-addon-companion-satellite"
init: false
startup: services
boot: auto

# Map the Satellite REST/Web UI port.
# host_network is NOT used so that this explicit port mapping works reliably.
# If you need mDNS discovery (Companion auto-detecting Satellite) you can
# enable host_network manually, but the port mapping below is sufficient for
# normal operation via the web UI and REST API.
ports:
  9999/tcp: 9999
ports_description:
  9999/tcp: "Satellite REST API / Web UI"

# USB passthrough: required so that Stream Deck and other HID/USB surfaces
# that are physically attached to the Home Assistant host are visible inside
# the add-on container.
usb: true
udev: true

options:
  rest_port: 9999
  companion_host: "127.0.0.1"
  companion_port: 16622

schema:
  rest_port: int(0,65535)
  companion_host: str
  companion_port: int(1,65535)
